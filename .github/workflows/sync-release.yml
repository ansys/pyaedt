name: Sync main to release/2.0

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger
  pull_request:
    branches:
      - release/2.0
    types: [opened, synchronize, reopened, ready_for_review]

env:
  ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
  MAIN_PYTHON_VERSION: '3.13'
  TESTS_VERSION: '3.10'
  PACKAGE_NAME: 'PyAEDT'
  ON_CI: True
  PYTEST_ARGUMENTS: -vvv --color=yes -ra --durations=25 --maxfail=10 --junitxml=junit/test-results.xml
  PYAEDT_LOCAL_SETTINGS_PATH: 'tests/pyaedt_settings.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  # Sync jobs: only on schedule / workflow_dispatch
  check-conflicts:
    name: "Check merge conflicts (main to release/2.0)"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_conflicts: ${{ steps.check.outputs.has_conflicts }}
    steps:
      - name: Checkout release/2.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: release/2.0
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch main
        run: git fetch origin main

      - name: Try merge (dry-run)
        id: check
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          # Keep release/2.0 version of __init__.py to avoid version conflicts
          git config merge.ours.driver true
          echo 'src/ansys/aedt/core/__init__.py merge=ours' >> .gitattributes
          if git merge --no-commit --no-ff origin/main; then
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
            git merge --abort 2>/dev/null || true
          else
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
            git merge --abort 2>/dev/null || true
          fi
          # Clean up temporary .gitattributes change
          git checkout -- .gitattributes 2>/dev/null || true

  report-conflicts:
    name: "Report merge conflicts"
    needs: check-conflicts
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      needs.check-conflicts.outputs.has_conflicts == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Fail with conflict message
        run: |
          echo "::error::Merge conflicts detected between main and release/2.0. Manual intervention required."
          exit 1

  create-sync-pr:
    name: "Create sync PR (main to release/2.0)"
    needs: check-conflicts
    if: |
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      needs.check-conflicts.outputs.has_conflicts == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

      - name: Create or update sync branch
        id: sync
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          # Keep release/2.0 version of __init__.py to avoid version conflicts
          git config merge.ours.driver true
          git fetch origin main release/2.0
          BRANCH="auto/sync-main-to-release-2.0"
          git checkout -b "$BRANCH" origin/release/2.0
          echo 'src/ansys/aedt/core/__init__.py merge=ours' >> .gitattributes
          MERGE_OUTPUT=$(git merge --no-ff origin/main -m "chore: sync main into release/2.0" 2>&1) || true
          if echo "$MERGE_OUTPUT" | grep -q "Already up to date"; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Branches are already up to date. Skipping."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            git checkout -- .gitattributes 2>/dev/null || true
            git push origin "$BRANCH" --force
          fi

      - name: Open PR (skip if already exists)
        if: steps.sync.outputs.up_to_date != 'true'
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          BRANCH="auto/sync-main-to-release-2.0"
          EXISTING=$(gh pr list --head "$BRANCH" --base release/2.0 --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            BODY="## Description
          Automated weekly sync of \`main\` into \`release/2.0\`. No conflicts detected.

          ## Issue linked
          N/A - automated sync.

          ## Checklist
          - [x] I have tested my changes locally.
          - [x] I have followed the coding style guidelines of this project.
          - [x] I have reviewed my changes before submitting this pull request."

            gh pr create \
              --head "$BRANCH" \
              --base release/2.0 \
              --title "CHORE: sync main into release/2.0" \
              --body "$BODY"
          else
            echo "PR #$EXISTING already exists, skipping creation."
          fi

  # CI jobs: run on PRs toward release/2.0
  pr-title:
    name: Check the title of the PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check the title of the pull request
        uses: ansys/actions/check-pr-title@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          use-upper-case: true

  vulnerabilities:
    name: "Vulnerabilities"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ansys/actions/check-vulnerabilities@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          dev-mode: true
          extra-targets: 'all'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          python-package-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

  actions-security:
    name: "Check actions security"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ansys/actions/check-actions-security@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          generate-summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          auditing-level: 'high'

  doc-style:
    name: Documentation style check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check documentation style
        uses: ansys/actions/doc-style@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: '["doc/source", ".github/plugin", ".github/skills"]'
          fail-level: 'warning'

  doc-build:
    name: Documentation build
    if: github.event_name == 'pull_request'
    needs: [doc-style]
    runs-on: ubuntu-latest
    steps:
      - name: Documentation build
        uses: ansys/actions/doc-build@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          dependencies: "graphviz texlive-latex-extra latexmk texlive-xetex texlive-fonts-extra"
          skip-install: true
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          use-python-cache: false
          sphinxopts: '-j auto --color -w build_errors.txt'
          check-links: false
          needs-quarto: false
          optional-dependencies-name: 'all'
          group-dependencies-name: 'doc'

  smoke-tests:
    name: Build wheelhouse and smoke tests
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        target: ['', 'all']
    steps:
      - name: Build wheelhouse and perform smoke test
        id: build-wheelhouse
        uses: ansys/actions/build-wheelhouse@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          attest-provenance: true
          library-name: ${{ env.PACKAGE_NAME }}
          operating-system: ${{ matrix.os }}
          python-version: ${{ matrix.python-version }}
          target: ${{ matrix.target }}
          use-python-cache: false
          whitelist-license-check: 'fpdf2'

      - name: Import python package
        env:
          ACTIVATE_VENV: ${{ steps.build-wheelhouse.outputs.activate-venv }}
        shell: bash
        run: |
          ${ACTIVATE_VENV}
          python -c "import ansys.aedt.core; from ansys.aedt.core import __version__"

  unit-tests:
    name: Unit tests
    if: github.event_name == 'pull_request'
    needs: [smoke-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Xvfb
        shell: bash
        run: sudo apt-get install -y xvfb

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.TESTS_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install pyaedt and tests dependencies
        run: |
          source .venv/bin/activate
          uv sync --frozen --group tests --extra all

      - name: Run unit tests
        env:
          PYTEST_ARGUMENTS: ${{ env.PYTEST_ARGUMENTS }}
        run: |
          source .venv/bin/activate
          xvfb-run pytest ${PYTEST_ARGUMENTS} tests/unit

      - name: Upload pytest test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-unit
          path: junit/test-results.xml
        if: ${{ always() }}

  integration-tests:
    name: Integration tests
    if: github.event_name == 'pull_request'
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.TESTS_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install pyaedt and tests dependencies
        run: |
          source .venv/bin/activate
          uv sync --frozen --group tests --extra all

      - name: Run integration tests
        env:
          PYTEST_ARGUMENTS: ${{ env.PYTEST_ARGUMENTS }}
        run: |
          source .venv/bin/activate
          pytest ${PYTEST_ARGUMENTS} tests/integration

      - name: Upload pytest test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-integration
          path: junit/test-results.xml
        if: ${{ always() }}

# =================================================================================================
# vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv    RUNNING ON SELF-HOSTED RUNNER    vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv
# =================================================================================================

  system-tests-solvers-windows:
    name: Test solvers (windows)
    needs: [integration-tests]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: [ self-hosted, Windows, pyaedt ]
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.TESTS_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install pyaedt and tests dependencies
        run: |
          .venv\Scripts\Activate.ps1
          uv sync --frozen --group tests --extra all

      - name: Remove Ansys processes (if any)
        shell: powershell
        run: |
          Get-Process | Where-Object {
            $_.Path -like "*ansys inc*" -or $_.Path -like "*ansysem*"
          } | ForEach-Object {
            Write-Output "Killing $($_.Name) (PID: $($_.Id))"
            Stop-Process -Id $_.Id -Force
          }

      - name: Run tests marked with 'solvers'
        env:
          PYTHONMALLOC: malloc
          PYTEST_ARGUMENTS: ${{ env.PYTEST_ARGUMENTS }}
        run: |
          .venv\Scripts\Activate.ps1
          $args = $env:PYTEST_ARGUMENTS -split ' '
          pytest @args --timeout=600 tests/system/solvers

      - name: Upload pytest test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-solvers-windows
          path: junit/test-results.xml
        if: ${{ always() }}

# =================================================================================================
# vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv    RUNNING ON SELF-HOSTED RUNNER    vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv
# =================================================================================================

  system-tests-solvers-linux:
    name: Test solvers (linux)
    needs: [integration-tests]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: [ self-hosted, Linux, pyaedt ]
    env:
      ANSYSEM_ROOT261: '/usr/ansys_inc/v261/AnsysEM'
      ANS_NODEPCHECK: '1'
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.TESTS_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install pyaedt and tests dependencies
        run: |
          source .venv/bin/activate
          uv sync --frozen --group tests --extra all

      - name: Remove Ansys processes (if any)
        shell: bash
        run: |
          for pid in $(ps -eo pid,comm,args | grep -iE "ansys.inc|ansysem" | grep -v grep | awk '{print $1}'); do
            echo "Killing PID $pid"
            kill -9 "$pid"
          done

      - name: Run tests marked with 'solvers'
        env:
          PYTEST_ARGUMENTS: ${{ env.PYTEST_ARGUMENTS }}
        run: |
          source .venv/bin/activate
          pytest ${PYTEST_ARGUMENTS} --timeout=600 tests/system/solvers

      - name: Upload pytest test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-solvers-linux
          path: junit/test-results.xml
        if: ${{ always() }}

