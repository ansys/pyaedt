name: GitHub CI CD
on:
  pull_request:
    # GitHub default types + ready_for_review to trigger the workflow on PRs no longer in draft mode.
    # See https://github.com/ansys/pyaedt/issues/5223 for more information
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  MAIN_PYTHON_VERSION: '3.13'
  PACKAGE_NAME: 'PyAEDT'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Disable all default permissions at workflow level for security (least privilege principle)
# Individual jobs will explicitly request only the permissions they need
permissions: {}

jobs:

  vulnerabilities-windows:
    name: Vulnerabilities windows
    runs-on: windows-latest
    permissions:
      contents: read   # Required to read repository content for vulnerability scanning
    steps:
      - uses: ansys/actions/check-vulnerabilities@fix/check_vulnerabilities
        with:
          dev-mode: ${{ github.ref != 'refs/heads/main' }}
          extra-targets: 'all'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          python-package-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

  manual-vulnerabilities-windows:
    name: Manual vulnerabilities windows
    runs-on: windows-latest
    permissions:
      contents: read   # Required to read repository content for vulnerability scanning
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Create virtual environment
        run: uv venv .venv

      - name: Download check_vulnerabilities.py and requirements.txt
        run: |
          curl -sSL -o check_vulnerabilities.py https://raw.githubusercontent.com/ansys/actions/fix/check_vulnerabilities/check-vulnerabilities/check_vulnerabilities.py
          curl -sSL -o requirements_vuln.txt https://raw.githubusercontent.com/ansys/actions/fix/check_vulnerabilities/check-vulnerabilities/requirements.txt

      - name: Install requirements
        run: |
          .venv\Scripts\Activate.ps1
          uv pip install -r requirements_vuln.txt

      - name: Install repository
        run: |
          .venv\Scripts\Activate.ps1
          uv pip install -e .[all]

      - name: Run vulnerability check
        env:
          DEPENDENCY_CHECK_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          DEPENDENCY_CHECK_PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          DEPENDENCY_CHECK_REPOSITORY: ${{ github.repository }}
        run: |
          .venv\Scripts\Activate.ps1
          python check_vulnerabilities.py --run-local

  vulnerabilities-linux:
    name: Vulnerabilities linux
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read repository content for vulnerability scanning
    steps:
      - uses: ansys/actions/check-vulnerabilities@fix/check_vulnerabilities
        with:
          dev-mode: ${{ github.ref != 'refs/heads/main' }}
          extra-targets: 'all'
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          python-package-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

  manual-vulnerabilities-linux:
    name: Manual vulnerabilities linux
    runs-on: ubuntu-latest
    permissions:
      contents: read   # Required to read repository content for vulnerability scanning
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Create virtual environment
        run: uv venv .venv

      - name: Download check_vulnerabilities.py and requirements.txt
        run: |
          curl -sSL -o check_vulnerabilities.py https://raw.githubusercontent.com/ansys/actions/fix/check_vulnerabilities/check-vulnerabilities/check_vulnerabilities.py
          curl -sSL -o requirements_vuln.txt https://raw.githubusercontent.com/ansys/actions/fix/check_vulnerabilities/check-vulnerabilities/requirements.txt

      - name: Install requirements
        run: |
          .venv/bin/activate
          uv pip install -r requirements_vuln.txt

      - name: Install repository
        run: |
          .venv/bin/activate
          uv pip install -e .[all]

      - name: Run vulnerability check
        env:
          DEPENDENCY_CHECK_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          DEPENDENCY_CHECK_PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          DEPENDENCY_CHECK_REPOSITORY: ${{ github.repository }}
        run: |
          .venv/bin/activate
          python check_vulnerabilities.py --run-local
