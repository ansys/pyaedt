# =================================================================================================
# Linux jobs: venv from AEDT Python with --system-site-packages
# =================================================================================================

  system-test-solvers-linux:
    name: Testing solvers (Linux)
    runs-on: [ self-hosted, Linux, pyaedt ]
    env:
      ANSYSEM_ROOT261: '/usr/ansys_inc/v261/AnsysEM'
      ANS_NODEPCHECK: '1'
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create virtual environment from AEDT Python
        run: |
          "$ANSYSEM_ROOT261/${{ env.AEDT_PYTHON_LINUX_SUFFIX }}" -m venv --system-site-packages .venv
          source .venv/bin/activate
          python -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org pip -U
          python -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org wheel setuptools -U
          python -c "import sys; print(sys.executable)"

      - name: Install pyaedt and tests dependencies
        run: |
          source .venv/bin/activate
          pip install .ci/ansys-api-edb/ansys_api_edb-0.3.1.261.0-py3-none-any.whl
          pip install .ci/ansys-edb-core/ansys_edb_core-0.3.1.261.0-py3-none-any.whl
          pip install .ci/pyedb/pyedb-0.75.0.261.0-py3-none-any.whl
          pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org . --group tests

      - name: Remove Ansys processes (if any)
        shell: bash
        run: |
          for pid in $(ps -eo pid,comm,args | grep -iE "ansys.inc|ansysem" | grep -v grep | awk '{print $1}'); do
            echo "Killing PID $pid"
            kill -9 "$pid"
          done

      - name: Run tests marked with 'solvers'
        env:
          PYTEST_ARGUMENTS: ${{ env.PYTEST_ARGUMENTS }}
        run: |
          source .venv/bin/activate
          pytest ${PYTEST_ARGUMENTS} --timeout=600 -m solvers

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          name: codecov-system-solvers-tests-linux
          files: ./coverage.xml
          flags: system,solvers,linux

      - name: Upload pytest test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pytest-solvers-linux
          path: junit/test-results.xml
