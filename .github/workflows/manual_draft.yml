# =================================================================================================
# Package jobs: build site-packages bundles
# =================================================================================================

  package-windows:
    name: Build site-packages ZIP (Windows)
    needs:
      - system-test-solvers-windows
      - system-tests-general-windows
      - system-tests-visualization-windows
      - system-tests-emit-windows
      - system-tests-filter-solutions
      - system-test-solvers-linux
      - system-tests-general-linux
      - system-tests-visualization-linux
    runs-on: [ self-hosted, Windows, pyaedt ]
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create virtual environment from AEDT Python
        run: |
          & "$env:ANSYSEM_ROOT261\${{ env.AEDT_PYTHON_WINDOWS_SUFFIX }}" -m venv --system-site-packages .venv
          .venv\Scripts\Activate.ps1
          python -m pip install pip -U
          python -m pip install wheel setuptools -U
          python -c "import sys; print(sys.executable)"

      - name: Install pyaedt
        run: |
          .venv\Scripts\Activate.ps1
          pip install .ci/ansys-api-edb/ansys_api_edb-0.3.1.261.0-py3-none-any.whl
          pip install .ci/ansys-edb-core/ansys_edb_core-0.3.1.261.0-py3-none-any.whl
          pip install .ci/pyedb/pyedb-0.75.0.261.0-py3-none-any.whl
          pip install .

      - name: Create ZIP archive of site-packages
        run: |
          $sitePackages = ".venv\Lib\site-packages"
          Get-ChildItem -Path $sitePackages -Recurse -Filter __pycache__ -Directory | Remove-Item -Recurse -Force
          $exclude = @("pip", "pip-*dist-info", "setuptools", "setuptools-*dist-info", "wheel", "wheel-*dist-info")
          $items = Get-ChildItem -Path $sitePackages |
            Where-Object { $name = $_.Name; -not ($exclude | Where-Object { $name -like $_ }) }
          Compress-Archive -Path ($items.FullName) -DestinationPath "pyaedt_261sp2_winx64.zip" -Force
          Write-Output "Created pyaedt_261sp2_winx64.zip"

      - name: Upload pyaedt_261sp2_winx64.zip artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pyaedt_261sp2_winx64
          path: pyaedt_261sp2_winx64.zip

  package-linux:
    name: Build site-packages TGZ (Linux)
    needs:
      - system-test-solvers-windows
      - system-tests-general-windows
      - system-tests-visualization-windows
      - system-tests-emit-windows
      - system-tests-filter-solutions
      - system-test-solvers-linux
      - system-tests-general-linux
      - system-tests-visualization-linux
    runs-on: [ self-hosted, Linux, pyaedt ]
    env:
      ANSYSEM_ROOT261: '/usr/ansys_inc/v261/AnsysEM'
      ANS_NODEPCHECK: '1'
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create virtual environment from AEDT Python
        run: |
          "$ANSYSEM_ROOT261/${{ env.AEDT_PYTHON_LINUX_SUFFIX }}" -m venv --system-site-packages .venv
          source .venv/bin/activate
          python -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org pip -U
          python -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org wheel setuptools -U
          python -c "import sys; print(sys.executable)"

      - name: Install pyaedt
        run: |
          source .venv/bin/activate
          pip install .ci/ansys-api-edb/ansys_api_edb-0.3.1.261.0-py3-none-any.whl
          pip install .ci/ansys-edb-core/ansys_edb_core-0.3.1.261.0-py3-none-any.whl
          pip install .ci/pyedb/pyedb-0.75.0.261.0-py3-none-any.whl
          pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org .

      - name: Create TGZ archive of site-packages
        run: |
          SITE_PACKAGES=$(find .venv/lib -maxdepth 2 -name site-packages -type d | head -1)
          find "$SITE_PACKAGES" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          tar -czf pyaedt_261sp2_linx64.tgz -C "$SITE_PACKAGES" \
            --exclude='pip' \
            --exclude='pip-*dist-info' \
            --exclude='setuptools' \
            --exclude='setuptools-*dist-info' \
            --exclude='wheel' \
            --exclude='wheel-*dist-info' \
            .
          echo "Created pyaedt_261sp2_linx64.tgz"

      - name: Upload pyaedt_261sp2_linx64.tgz artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pyaedt_261sp2_linx64
          path: pyaedt_261sp2_linx64.tgz

