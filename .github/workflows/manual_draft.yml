name: Draft workflow (AEDT venv)

on:
  workflow_dispatch:

env:
  ON_CI: True
  PACKAGE_NAME: 'PyAEDT'
  PYTEST_ARGUMENTS: '-vvv --color=yes -ra --durations=25 --maxfail=10 --cov=ansys.aedt.core --cov-report=html --cov-report=xml --junitxml=junit/test-results.xml'
  # On Windows, ANSYSEM_ROOT261 is a pre-existing system environment variable
  # On Linux, it is defined per job as env var
  AEDT_PYTHON_WINDOWS_SUFFIX: 'commonfiles\CPython\3_10\winx64\Release\python\python.exe'
  AEDT_PYTHON_LINUX_SUFFIX: 'commonfiles/CPython/3_10/linx64/Release/python/bin/python'
  # Required to prevent _distutils_hack from overriding stdlib distutils when building
  # packages against the AEDT-bundled Python interpreter
  SETUPTOOLS_USE_DISTUTILS: stdlib
  ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

# =================================================================================================
# Windows jobs: venv from AEDT Python with --system-site-packages
# =================================================================================================

  system-test-solvers-windows:
    name: Testing solvers (Windows)
    runs-on: [ self-hosted, Windows, pyaedt ]
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create virtual environment from AEDT Python
        run: |
          & "$env:ANSYSEM_ROOT261\${{ env.AEDT_PYTHON_WINDOWS_SUFFIX }}" -m venv --system-site-packages .venv
          .venv\Scripts\Activate.ps1
          python -m pip install pip -U
          python -m pip install wheel setuptools -U
          python -c "import sys; print(sys.executable)"

      - name: Install pyaedt and tests dependencies
        run: |
          .venv\Scripts\Activate.ps1
          pip install .ci/ansys-api-edb/ansys_api_edb-0.3.1.261.0-py3-none-any.whl
          pip install .ci/ansys-edb-core/ansys_edb_core-0.3.1.261.0-py3-none-any.whl
          pip install .ci/pyedb/pyedb-0.75.0.261.0-py3-none-any.whl
          pip install . --group tests

      - name: Remove Ansys processes (if any)
        shell: powershell
        run: |
          Get-Process | Where-Object {
            $_.Path -like "*ansys inc*" -or $_.Path -like "*ansysem*"
          } | ForEach-Object {
            Write-Output "Killing $($_.Name) (PID: $($_.Id))"
            Stop-Process -Id $_.Id -Force
          }

      - name: Run tests marked with 'solvers'
        env:
          PYTHONMALLOC: malloc
        run: |
          .venv\Scripts\Activate.ps1
          $args = $env:PYTEST_ARGUMENTS -split ' '
          pytest @args --timeout=600 -m solvers

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          name: codecov-system-solvers-tests-windows
          files: ./coverage.xml
          flags: system,solvers,windows

      - name: Upload pytest test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-solvers-windows
          path: junit/test-results.xml
        if: ${{ always() }}

  system-tests-general-windows:
    name: Testing general (Windows)
    runs-on: [ self-hosted, Windows, pyaedt ]
    steps:
      - name: Install Git and checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create virtual environment from AEDT Python
        run: |
          & "$env:ANSYSEM_ROOT261\${{ env.AEDT_PYTHON_WINDOWS_SUFFIX }}" -m venv --system-site-packages .venv
          .venv\Scripts\Activate.ps1
          python -m pip install pip -U
          python -m pip install wheel setuptools -U
          python -c "import sys; print(sys.executable)"

      - name: Install pyaedt and tests dependencies
        run: |
          .venv\Scripts\Activate.ps1
          pip install .ci/ansys-api-edb/ansys_api_edb-0.3.1.261.0-py3-none-any.whl
          pip install .ci/ansys-edb-core/ansys_edb_core-0.3.1.261.0-py3-none-any.whl
          pip install .ci/pyedb/pyedb-0.75.0.261.0-py3-none-any.whl
          pip install . --group tests

      - name: Remove Ansys processes (if any)
        shell: powershell
        run: |
          Get-Process | Where-Object {
            $_.Path -like "*ansys inc*" -or $_.Path -like "*ansysem*"
          } | ForEach-Object {
            Write-Output "Killing $($_.Name) (PID: $($_.Id))"
            Stop-Process -Id $_.Id -Force
          }

      - name: Run tests marked with 'general'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        env:
          PYTHONMALLOC: malloc
        with:
          max_attempts: 2
          retry_on: error
          timeout_minutes: 120
          command: |
            .venv\Scripts\Activate.ps1
            $args = $env:PYTEST_ARGUMENTS -split ' '
            pytest @args -n 4 --dist loadfile --timeout=600 -m general

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
