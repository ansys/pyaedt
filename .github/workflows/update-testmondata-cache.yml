name: Update Testmon Cache on Merge

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      run_id:
        # For getting the run ID of the CI workflow to pull artifacts from when manually triggering this workflow, use GitHub CLI locally.
        description: 'CI run ID to pull artifacts from'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  ON_CI: True
  PYAEDT_LOCAL_SETTINGS_PATH: 'tests/pyaedt_settings.yaml'
  TESTMON_DATAFILE: '.testmondata'
  TESTMON_CACHE_KEY_SOLVERS_WIN: 'testmondata-solvers-win'
  TESTMON_CACHE_KEY_SOLVERS_LINUX: 'testmondata-solvers-linux'
  TESTMON_CACHE_KEY_GENERAL_WIN: 'testmondata-general-win'
  TESTMON_CACHE_KEY_GENERAL_LINUX: 'testmondata-general-linux'
  TESTMON_CACHE_KEY_VISUALIZATION_WIN: 'testmondata-visualization-win'
  TESTMON_CACHE_KEY_VISUALIZATION_LINUX: 'testmondata-visualization-linux'
  TESTMON_CACHE_KEY_ICEPAK_WIN: 'testmondata-icepak-win'
  TESTMON_CACHE_KEY_ICEPAK_LINUX: 'testmondata-icepak-linux'
  TESTMON_CACHE_KEY_LAYOUT_WIN: 'testmondata-layout-win'
  TESTMON_CACHE_KEY_LAYOUT_LINUX: 'testmondata-layout-linux'
  TESTMON_CACHE_KEY_FILTER_WIN: 'testmondata-filter-win'
  TESTMON_CACHE_KEY_EMIT_WIN: 'testmondata-emit-win'

jobs:
  find-pr-run:
    name: Find PR CI run
    runs-on: ubuntu-latest
    # Only run if manually triggered OR if the PR was actually merged (not just closed)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    permissions:
        actions: read # Needed to list and read workflow runs
        contents: read # Needed to access repository metadata for run lookup
    outputs:
      run_id: ${{ steps.find.outputs.run_id }}
    steps:
      - name: Find latest CI run for merged PR
        id: find
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_RUN_ID: ${{ inputs.run_id }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Check if run_id is provided from workflow_dispatch
          if [ -n "$MANUAL_RUN_ID" ]; then
            echo "Using manually provided Run ID: $MANUAL_RUN_ID"
            echo "run_id=$MANUAL_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="$PR_BRANCH"
          echo "Searching for latest run on branch: $BRANCH"

          # Get the latest CI run for this PR branch
          # Since the PR was merged, we assume the run was completed
          RUN_ID=$(gh run list \
            --repo "$REPOSITORY" \
            --workflow=ci_cd.yml \
            --branch "$BRANCH" \
            --event=pull_request \
            --json databaseId \
            --jq '.[0].databaseId')

          # Validation
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No CI run found for branch $BRANCH."
            exit 1
          fi

          echo "Found Run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

  update-testmon-caches:
    name: Update testmon cache (${{ matrix.name }})
    needs: find-pr-run
    if: needs.find-pr-run.outputs.run_id != ''
    runs-on: ubuntu-latest
    permissions:
        actions: write # Needed to delete and save Actions caches
        contents: write # Needed to write cache data into the repository scope
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: solvers-win
            artifact: testmondata-solvers-win
            cache_key: testmondata-solvers-win
          - name: solvers-linux
            artifact: testmondata-solvers-linux
            cache_key: testmondata-solvers-linux
          - name: general-win
            artifact: testmondata-general-win
            cache_key: testmondata-general-win
          - name: general-linux
            artifact: testmondata-general-linux
            cache_key: testmondata-general-linux
          - name: visualization-win
            artifact: testmondata-visualization-win
            cache_key: testmondata-visualization-win
          - name: visualization-linux
            artifact: testmondata-visualization-linux
            cache_key: testmondata-visualization-linux
          - name: icepak-win
            artifact: testmondata-icepak-win
            cache_key: testmondata-icepak-win
          - name: icepak-linux
            artifact: testmondata-icepak-linux
            cache_key: testmondata-icepak-linux
          - name: layout-win
            artifact: testmondata-layout-win
            cache_key: testmondata-layout-win
          - name: layout-linux
            artifact: testmondata-layout-linux
            cache_key: testmondata-layout-linux
          - name: filter-win
            artifact: testmondata-filter-win
            cache_key: testmondata-filter-win
          - name: emit-win
            artifact: testmondata-emit-win
            cache_key: testmondata-emit-win
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
            persist-credentials: false

      - name: Download testmon artifact
        id: download
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ needs.find-pr-run.outputs.run_id }}
          ARTIFACT_NAME: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          mkdir -p artifact
          gh run download "$RUN_ID" --name "$ARTIFACT_NAME" --dir artifact || true
          FILE_PATH=$(find artifact -name ".testmondata" -type f -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Artifact $ARTIFACT_NAME not found. Skipping."
            exit 0
          fi
          echo "Artifact $ARTIFACT_NAME found at $FILE_PATH"
          mv "$FILE_PATH" .testmondata
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "path=.testmondata" >> "$GITHUB_OUTPUT"

      - name: Delete old testmon caches
        if: steps.download.outputs.found == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CACHE_KEY: ${{ matrix.cache_key }}
        run: |
          gh cache list --key ${CACHE_KEY}-main --json key --jq '.[].key' | xargs -I {} gh cache delete {} || true

      - name: Save updated testmon cache
        if: steps.download.outputs.found == 'true'
        uses: actions/cache/save@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ${{ steps.download.outputs.path }}
          # Uses the SHA of the current workflow run (the merge commit on main) to save the cache
          key: ${{ matrix.cache_key }}-main
          enableCrossOsArchive: true