fragments:
  - title: PyAEDT 1.0 migration and release highlights
    version: 1.0.0
    content: |
      PyAEDT 1.0 is the first major release of the library and includes the
      package namespace migration from ``pyaedt`` to ``ansys.aedt.core``.
      If your code still imports from ``pyaedt``, update those imports before
      moving to 1.0.

      Usage:
      .. code:: python

          # Before
          from pyaedt import Circuit

          # After
          from ansys.aedt.core import Circuit

      This release also finalizes the removal of deprecated arguments and
      continues the PEP 8-aligned module renames introduced during the 1.0
      release candidate cycle.

      For migration details, see the `PyAEDT 1.0 migration guide
      <https://aedt.docs.pyansys.com/version/stable/release_1_0.html>`_.
      For the complete list of changes included in the release, see the
      `PyAEDT 1.0 release notes
      <https://aedt.docs.pyansys.com/version/stable/changelog.html>`_.